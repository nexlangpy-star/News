name: Build APK and IPA

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  BUILD_NUMBER: 1
  BUILD_VERSION: 1.0.0
  PYTHON_VERSION: 3.12.2
  FLUTTER_VERSION: 3.22.2

jobs:
  # ------------------------------------------------------------
  #  APK (Android)
  # ------------------------------------------------------------
  build-apk:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyarmor

    - name: Obfuscate Python Code with PyArmor
      run: |
        pyarmor gen --recursive --output dist_obf .

    - name: Replace source with obfuscated code
      run: |
        rm -rf *.py
        cp -r dist_obf/* .
        rm -rf dist_obf

    - name: Setup Java JDK
      uses: actions/setup-java@v4.2.1
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}

    - name: Install Linux dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y ninja-build libgtk-3-dev unzip wget

    - name: Setup Android SDK
      run: |
        # إنشاء مجلد Android SDK
        export ANDROID_HOME=$HOME/android-sdk
        mkdir -p $ANDROID_HOME
        
        # تحميل Command Line Tools (أحدث إصدار)
        cd $ANDROID_HOME
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        rm commandlinetools-linux-11076708_latest.zip
        
        # ترتيب المجلدات بالشكل الصحيح
        mkdir -p cmdline-tools
        mv cmdline-tools cmdline-tools-temp
        mv cmdline-tools-temp cmdline-tools/latest
        
        # إضافة للمسار
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
        
        # قبول الرخص
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
        
        # تثبيت الإصدارات المطلوبة (SDK 36 و BuildTools 28.0.3)
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          "platform-tools" \
          "platforms;android-36" \
          "build-tools;28.0.3" \
          "cmdline-tools;latest"
        
        # حفظ المتغيرات للخطوات اللاحقة
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

    - name: Verify Android Setup
      run: |
        flutter doctor -v
        sdkmanager --list | grep -E "platforms;android|build-tools"

    - name: Flet Build APK
      run: |
        flutter config --no-analytics
        flet build apk --verbose --yes --build-number=$BUILD_NUMBER --build-version=$BUILD_VERSION

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4.3.4
      with:
        name: apk-build-artifact
        path: build/apk
        if-no-files-found: warn
        overwrite: false

  # ------------------------------------------------------------
  #  IPA (iOS)
  # ------------------------------------------------------------
  build-ipa:
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyarmor

    - name: Obfuscate Python Code with PyArmor
      run: |
        pyarmor gen --recursive --output dist_obf .

    - name: Replace source with obfuscated code
      run: |
        rm -rf *.py
        cp -r dist_obf/* .
        rm -rf dist_obf

    - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}

    - name: Flet Build IPA
      run: |
        flutter config --no-analytics
        flet build ipa --verbose --yes --build-number=$BUILD_NUMBER --build-version=$BUILD_VERSION

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4.3.4
      with:
        name: ipa-build-artifact
        path: build/ipa
        if-no-files-found: warn
        overwrite: false
